{% extends "base.html" %}

{% block content %}
<section class="section">
    <h2>Timeline</h2>
    <p>Leave a message and it'll show up in the timeline below.</p>

    <form id="timeline-form" class="timeline-form" autocomplete="on">
        <div class="form-row">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="form-row">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-row">
            <label for="content">Message</label>
            <textarea id="content" name="content" rows="3" placeholder="What's on your mind?" required></textarea>
        </div>
        <div class="form-actions">
            <button type="submit">Post</button>
            <span id="timeline-status" class="timeline-status" role="status" aria-live="polite"></span>
        </div>
    </form>
</section>

<section class="section">
    <h2>Posts</h2>
    <div id="timeline-posts" class="timeline-posts" aria-live="polite"></div>
</section>

<script src="{{ url_for('static', filename='scripts/timeline.js') }}"></script>
{% endblock %}
